<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Style Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <h1>Kanban Style Task Manager</h1>
      <span id="taskCounter" class="task-counter">Total Tasks: 0</span>
    </div>

    <div class="header-right">
      <label for="priorityFilter">Filter by Priority:</label>
      <select id="priorityFilter">
        <option value="all">All</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
  </header>

  <!-- Main Board -->
  <main class="board">

    <!-- To Do Column -->
    <section id="todo" class="column">
      <h2>To Do</h2>
      <ul id="todoList" class="task-list"></ul>
      <button class="add-task-btn" data-column="todo">Add Task</button>
    </section>

    <!-- In Progress Column -->
    <section id="inprogress" class="column">
      <h2>In Progress</h2>
      <ul id="inprogressList" class="task-list"></ul>
      <button class="add-task-btn" data-column="inprogress">Add Task</button>
    </section>

    <!-- Done Column -->
    <section id="done" class="column">
      <h2>Done</h2>
      <ul id="doneList" class="task-list"></ul>
      <button class="add-task-btn" data-column="done">Add Task</button>
      <button id="clearDoneBtn" class="clear-done-btn">Clear All</button>
    </section>

  </main>

  <!-- Modal -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle">Add Task</h2>

      <form id="taskForm">
        <div class="form-group">
          <label for="taskTitle">Title</label>
          <input type="text" id="taskTitle" required />
        </div>

        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label for="taskPriority">Priority</label>
          <select id="taskPriority" required>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="form-group">
          <label for="taskDueDate">Due Date</label>
          <input type="date" id="taskDueDate" />
        </div>

        <div class="form-actions">
          <button type="submit" id="saveTaskBtn">Save</button>
          <button type="button" id="cancelTaskBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="taskmanager.js"></script>
</body>
</html>
